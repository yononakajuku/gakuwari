<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>学割証申請フォーム</title>

<style>
:root {
  --bg:#f4f5f7;
  --card:#fff;
  --text:#1f2937;
  --border:#d1d5db;
  --accent:#111827;
  --danger:#dc2626;
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:10px;
  background:var(--bg);
  font-family:sans-serif;
}

.container{max-width:700px;margin:auto;}
.card{background:#fff;padding:16px;border-radius:16px;}

h1{font-size:22px;margin-bottom:8px;}

.section{margin-top:16px;padding:12px;border:1px solid #eee;border-radius:12px;}

.field{margin-bottom:14px;}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
}

.required{
  color:var(--danger);
  margin-left:6px;
  font-size:12px;
}

input,select{
  width:100%;
  padding:12px;
  border:1px solid var(--border);
  border-radius:10px;
}

.choice-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}

#msg{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>学割証申請フォーム</h1>

<div class="section">

<div class="field">
<label>申請日 <span class="required">必須</span></label>
<input type="date" id="applicationDate">
</div>

<div class="field">
<label>氏名 <span class="required">必須</span></label>
<input type="text" id="name">
</div>

<div class="field">
<label>男女 <span class="required">必須</span></label>
<div class="choice-card">
<input type="radio" name="gender" value="男">男
</div>
<div class="choice-card">
<input type="radio" name="gender" value="女">女
</div>
</div>

<div class="field">
<label>受け取り希望日 <span class="required">必須</span></label>
<input type="date" id="receiveDate">
</div>

<div class="field">
<label>購入予定日 <span class="required">必須</span></label>
<input type="date" id="purchaseDate">
</div>

<div class="field">
<label>メールアドレス <span class="required">必須</span></label>
<input type="email" id="email">
</div>

<button onclick="submitForm()">送信</button>

<div id="msg"></div>

</div>
</div>
</div>

<script>

// ===== Worker URL =====
      const WORKER_URL = "https://yononaka-gakuwari.tarohayata.workers.dev";


// ===== 今日セット =====
function todayStr(){
  const d=new Date();
  return d.toISOString().split("T")[0];
}
document.getElementById("applicationDate").value=todayStr();

// ===== 日付制御 =====
function updateDates(){
  const app=document.getElementById("applicationDate").value;
  const r=document.getElementById("receiveDate");
  const p=document.getElementById("purchaseDate");

  if(!app)return;

  const base=new Date(app);
  base.setDate(base.getDate()+10);
  const min=base.toISOString().split("T")[0];

  r.min=min;
  p.min=min;

  if(r.value && r.value<min){r.value="";}
  if(p.value && p.value<min){p.value="";}

  if(r.value){
    p.min=r.value;
    if(p.value && p.value<r.value){p.value="";}
  }
}

document.getElementById("applicationDate").addEventListener("change",updateDates);
document.getElementById("receiveDate").addEventListener("change",updateDates);

// ===== iPhone対策 =====
document.getElementById("receiveDate").addEventListener("change",()=>{
  const min=document.getElementById("receiveDate").min;
  const val=document.getElementById("receiveDate").value;
  if(val<min){alert("10日後以降のみ");document.getElementById("receiveDate").value="";}
});

// ===== ラジオ解除 =====
document.querySelectorAll("input[type=radio]").forEach(r=>{
  r.addEventListener("click",function(){
    if(this.dataset.checked==="true"){
      this.checked=false;
      this.dataset.checked="false";
    }else{
      document.querySelectorAll(`input[name="${this.name}"]`).forEach(x=>x.dataset.checked="false");
      this.dataset.checked="true";
    }
  });
});

// ===== 送信 =====
async function submitForm(){

  const name=document.getElementById("name").value;
  const gender=document.querySelector('input[name="gender"]:checked');
  const email=document.getElementById("email").value;

  if(!name || !gender || !email){
    msg("必須項目を入力してください",true);
    return;
  }

  const data={
    name,
    gender:gender.value,
    email
  };

  try{
    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const json=await res.json();
    msg("送信成功！受付番号："+json.receiptNo,false);

  }catch(e){
    msg("送信失敗",true);
  }
}

// ===== メッセージ =====
function msg(text,isErr){
  const m=document.getElementById("msg");
  m.innerText=text;
  m.style.color=isErr?"red":"green";
}

</script>

</body>
</html>
