<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>学割証申請フォーム</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --text: #1f2937;
        --subtext: #6b7280;
        --border: #d1d5db;
        --accent: #111827;
        --danger: #dc2626;
        --success: #166534;
        --marker: #374151;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        --disabled-bg: #f3f4f6;
        --disabled-text: #9ca3af;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        padding: 8px;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Yu Gothic", "Meiryo", sans-serif;
      }

      .container {
        width: 100%;
        max-width: 860px;
        margin: 0 auto;
        overflow-x: hidden;
      }

      .card {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 16px;
        border-radius: 20px;
        background: var(--card);
        box-shadow: var(--shadow);
        overflow-x: hidden;
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
        line-height: 1.3;
      }

      .lead {
        margin: 0 0 20px 0;
        color: var(--subtext);
        font-size: 15px;
        line-height: 1.6;
      }

      .section {
        width: 100%;
        max-width: 100%;
        margin: 0 0 16px 0;
        padding: 14px;
        border: 1px solid #ececec;
        border-radius: 16px;
        background: #fafafa;
        overflow-x: hidden;
      }

      .section-title {
        margin: 0 0 14px 0;
        font-size: 18px;
        font-weight: 700;
      }

      .field {
        width: 100%;
        max-width: 100%;
        margin: 0 0 16px 0;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label.main-label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.5;
      }

      .marker {
        color: var(--marker);
        margin-right: 6px;
      }

      .required {
        color: var(--danger);
        font-size: 12px;
        font-weight: 700;
        margin-left: 6px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        width: 100%;
        max-width: 100%;
      }

      .choice-grid {
        display: grid;
        gap: 10px;
        width: 100%;
        max-width: 100%;
      }

      .choice-inline-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-inline-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .choice-inline-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      input[type="text"],
      input[type="number"],
      input[type="date"],
      input[type="email"],
      select,
      textarea {
        display: block;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        margin: 0;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        font-size: 16px;
        line-height: 1.4;
        appearance: none;
        -webkit-appearance: none;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .choice-card {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        max-width: 100%;
        min-height: 52px;
        margin: 0;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        font-size: 16px;
        line-height: 1.4;
        overflow: hidden;
        transition: background 0.2s ease, opacity 0.2s ease;
      }

      .choice-card input[type="radio"],
      .choice-card input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin: 0;
        flex: 0 0 auto;
      }

      .choice-card.is-disabled {
        background: var(--disabled-bg);
        color: var(--disabled-text);
        cursor: not-allowed;
        opacity: 0.75;
      }

      .choice-card.is-disabled input {
        pointer-events: none;
      }

      .note {
        margin-top: 8px;
        color: var(--subtext);
        font-size: 13px;
        line-height: 1.6;
      }

      .hidden {
        display: none !important;
      }

      .submit-wrap {
        width: 100%;
        max-width: 100%;
        padding-top: 8px;
      }

      button {
        display: block;
        width: 100%;
        max-width: 100%;
        min-height: 56px;
        margin: 0;
        padding: 14px 16px;
        border: none;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      #message {
        display: none;
        width: 100%;
        max-width: 100%;
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 12px;
        background: #fff5f5;
        color: var(--danger);
        font-weight: 700;
        line-height: 1.7;
      }

      #message.show {
        display: block;
      }

      #message.success {
        background: #f0fdf4;
        color: var(--success);
      }

      #couponCountSection,
      #satelliteNameOtherSection,
      #purposeOtherSection,
      #shippingAddressSection {
        margin-top: 8px;
        margin-bottom: 16px;
      }

      #longDistanceSection1 {
        margin-top: 8px;
        margin-bottom: 20px;
      }

      #longDistanceSection2 {
        margin-top: 8px;
        margin-bottom: 20px;
      }

      #noSamePurchaseSection {
        margin-top: 8px;
        margin-bottom: 16px;
      }

      #longDistanceSection1 .field,
      #longDistanceSection2 .field,
      #noSamePurchaseSection .field {
        margin-bottom: 0;
      }

      .fade-section {
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }

      .fade-section.show {
        opacity: 1;
        transform: translateY(0);
      }

    

      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        .card {
          padding: 14px;
        }

        .row {
          grid-template-columns: 1fr;
        }

        .choice-inline-3,
        .choice-inline-4 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 8px;
        }

        .container {
          width: 100%;
          max-width: 100%;
        }

        .card {
          padding: 12px;
          border-radius: 16px;
        }

        .section {
          padding: 12px;
          border-radius: 14px;
        }

        h1 {
          font-size: 22px;
        }

        .lead {
          font-size: 14px;
        }

        label.main-label {
          font-size: 15px;
        }

        .choice-inline-2,
        .choice-inline-3,
        .choice-inline-4 {
          grid-template-columns: 1fr;
        }

        .choice-card,
        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="email"],
        select,
        textarea {
          font-size: 16px;
        }

        button {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" id="formCard">
        <h1>学割証申請フォーム</h1>
        <p class="lead">
          必要事項を入力して送信してください。送信後、受付番号が表示されます。
        </p>

        <div class="section">
          <h2 class="section-title">基本情報</h2>

          <div class="field">
            <label class="main-label" for="applicationDate">
              <span class="marker">▫️</span>申請日 <span class="required">必須</span>
            </label>
            <input id="applicationDate" type="date" />
          </div>

          <div class="field">
            <label class="main-label" for="name">
              <span class="marker">▫️</span>氏名 <span class="required">必須</span>
            </label>
            <input id="name" type="text" />
          </div>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>男女 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="gender" value="男" /> 男</label>
              <label class="choice-card"><input type="radio" name="gender" value="女" /> 女</label>
            </div>
          </div>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>サテライト教室名 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="satelliteName" value="北京都" /> 北京都</label>
              <label class="choice-card"><input type="radio" name="satelliteName" value="その他" /> その他</label>
            </div>
          </div>

          <div id="satelliteNameOtherSection" class="hidden">
            <div class="field">
              <label class="main-label" for="satelliteNameOther">
                <span class="marker">▫️</span>サテライト教室名（その他） <span class="required">必須</span>
              </label>
              <input id="satelliteNameOther" type="text" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label class="main-label" for="age">
                <span class="marker">▫️</span>年齢 <span class="required">必須</span>
              </label>
              <input id="age" type="number" inputmode="numeric" />
            </div>

            <div class="field">
              <label class="main-label" for="studentNo">
                <span class="marker">▫️</span>学籍番号 <span class="required">必須</span>
              </label>
              <input id="studentNo" type="text" />
            </div>
          </div>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>学年 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-3">
              <label class="choice-card"><input type="radio" name="grade" value="1" /> 1</label>
              <label class="choice-card"><input type="radio" name="grade" value="2" /> 2</label>
              <label class="choice-card"><input type="radio" name="grade" value="3" /> 3</label>
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="applicantEmail">
              <span class="marker">▫️</span>メールアドレス <span class="required">必須</span>
            </label>
            <input id="applicantEmail" type="email" />
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">申請内容</h2>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>種類 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="ticketType" value="回数券" /> 回数券</label>
              <label class="choice-card"><input type="radio" name="ticketType" value="遠距離乗車券" /> 遠距離乗車券</label>
            </div>
          </div>

          <div id="couponCountSection" class="hidden">
            <div class="field">
              <label class="main-label" for="couponCount">
                <span class="marker">▫️</span>回数券の枚数 <span class="required">必須</span>
              </label>
              <select id="couponCount">
                <option value="">選択してください</option>
                <option value="10枚">10枚</option>
                <option value="20枚">20枚</option>
                <option value="30枚">30枚</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>目的 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2" id="purposeGroup">
              <label class="choice-card" data-purpose-value="通学"><input type="radio" name="purpose" value="通学" /> 通学</label>
              <label class="choice-card" data-purpose-value="観光"><input type="radio" name="purpose" value="観光" /> 観光</label>
              <label class="choice-card" data-purpose-value="進路関係"><input type="radio" name="purpose" value="進路関係" /> 進路関係</label>
              <label class="choice-card" data-purpose-value="その他"><input type="radio" name="purpose" value="その他" /> その他</label>
            </div>
          </div>

          <div id="purposeOtherSection" class="hidden">
            <div class="field">
              <label class="main-label" for="purposeOther">
                <span class="marker">▫️</span>目的（その他） <span class="required">必須</span>
              </label>
              <input id="purposeOther" type="text" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">乗車情報</h2>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>鉄道会社名1 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="companyName1" value="JR" /> JR</label>
              <label class="choice-card"><input type="radio" name="companyName1" value="丹後鉄道" /> 丹後鉄道</label>
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="route1">
              <span class="marker">▫️</span>乗車区間1 <span class="required">必須</span>
            </label>
            <input id="route1" type="text" placeholder="例: 西舞鶴〜東舞鶴のように記入してください" />
          </div>

          <div id="longDistanceSection1" class="hidden">
            <div class="field">
              <label class="main-label">
                <span class="marker">▫️</span>往復 / 片道
              </label>
              <div class="choice-grid choice-inline-2">
                <label class="choice-card"><input type="radio" name="tripType1" value="往復" /> 往復</label>
                <label class="choice-card"><input type="radio" name="tripType1" value="片道" /> 片道</label>
              </div>
            </div>
          </div>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>鉄道会社名2
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="companyName2" value="JR" /> JR</label>
              <label class="choice-card"><input type="radio" name="companyName2" value="丹後鉄道" /> 丹後鉄道</label>
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="route2">
              <span class="marker">▫️</span>乗車区間2
            </label>
            <input id="route2" type="text" placeholder="例: 西舞鶴〜東舞鶴のように記入してください" />
          </div>

          <div id="longDistanceSection2" class="hidden">
            <div class="field">
              <label class="main-label">
                <span class="marker">▫️</span>往復 / 片道2
              </label>
              <div class="choice-grid choice-inline-2">
                <label class="choice-card"><input type="radio" name="tripType2" value="往復" /> 往復</label>
                <label class="choice-card"><input type="radio" name="tripType2" value="片道" /> 片道</label>
              </div>
            </div>
          </div>
        </div>

        <div id="noSamePurchaseSection" class="section fade-section hidden">
          <h2 class="section-title">購入方法（往復の場合）</h2>

          <div class="field">
            <label class="choice-card">
              <input id="noSamePurchase" type="checkbox" />
              <span><span class="marker">▫️</span>同時購入しない</span>
            </label>
            <div class="note">
              ※ 往復分を希望するが、同時に購入しない場合（行き帰り別々に購入する場合）にチェックしてください。
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">受け取り情報</h2>

          <div class="field">
            <label class="main-label">
              <span class="marker">▫️</span>受け取り方法 <span class="required">必須</span>
            </label>
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"><input type="radio" name="receiveMethod" value="サテライト教室" /> サテライト教室</label>
              <label class="choice-card"><input type="radio" name="receiveMethod" value="自宅(代々木高校からの送料500円必要)" /> 自宅(代々木高校からの送料500円必要)</label>
            </div>
          </div>

          <div id="shippingAddressSection" class="hidden">
            <div class="field">
              <label class="main-label" for="shippingAddress">
                <span class="marker">▫️</span>発送先住所 <span class="required">必須</span>
              </label>
              <textarea id="shippingAddress"></textarea>
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="receiveDate">
              <span class="marker">▫️</span>受け取り希望日 <span class="required">必須</span>
            </label>
            <input id="receiveDate" type="date" />
            <div class="note">申請日から10日後以降を選んでください</div>
          </div>

          <div class="field">
            <label class="main-label" for="purchaseDate">
              <span class="marker">▫️</span>購入予定日 <span class="required">必須</span>
            </label>
            <input id="purchaseDate" type="date" />
            <div class="note">申請日から10日後以降、かつ受け取り希望日以降を選んでください</div>
          </div>
        </div>

        <div class="submit-wrap" id="submitWrap">
  <button id="submitButton" type="button">送信</button>
</div>

<div id="message"></div>
        </div>
      </div>
    </div>

    <script>
      const WORKER_URL = "https://yononaka-gakuwari.tarohayata.workers.dev";

      function getRadioValue(name) {
        const checked = document.querySelector(`input[name="${name}"]:checked`);
        return checked ? checked.value : "";
      }

      function formatDateToInputValue(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function showMessage(text, isSuccess = false) {
        const message = document.getElementById("message");
        message.classList.add("show");
        if (isSuccess) {
          message.classList.add("success");
        } else {
          message.classList.remove("success");
        }
        message.innerHTML = text;
      }

      function lockFormAfterSuccess() {
  // 送信ボタンだけ消す
  document.getElementById("submitWrap").classList.add("hidden");

  // フォーム入力部分だけ操作不可
  document.querySelectorAll("input, select, textarea").forEach(el => {
    el.disabled = true;
  });

  // ラジオ・チェックの見た目もクリック不可
  document.querySelectorAll(".choice-card").forEach(el => {
    el.style.pointerEvents = "none";
    el.style.opacity = "0.75";
  });

  // メッセージは表示したまま
  document.getElementById("message").classList.add("show");
}

      function setDefaultDates() {
        const today = new Date();
        const applicationDate = document.getElementById("applicationDate");
        const receiveDate = document.getElementById("receiveDate");
        const purchaseDate = document.getElementById("purchaseDate");

        if (!applicationDate.value) {
          applicationDate.value = formatDateToInputValue(today);
        }

        const baseDate = new Date(applicationDate.value);
        baseDate.setHours(0, 0, 0, 0);

        const plus10 = new Date(baseDate);
        plus10.setDate(plus10.getDate() + 10);

        const plus10Value = formatDateToInputValue(plus10);

        if (!receiveDate.value) {
          receiveDate.value = plus10Value;
        }

        if (!purchaseDate.value) {
          purchaseDate.value = plus10Value;
        }

        updateDateConstraints();
      }

      function getMinDateFromApplication() {
        const applicationDateValue = document.getElementById("applicationDate").value;
        if (!applicationDateValue) return "";

        const applicationDate = new Date(applicationDateValue);
        applicationDate.setHours(0, 0, 0, 0);

        const minDate = new Date(applicationDate);
        minDate.setDate(minDate.getDate() + 10);

        return formatDateToInputValue(minDate);
      }

      function updateDateConstraints() {
        const receiveDateInput = document.getElementById("receiveDate");
        const purchaseDateInput = document.getElementById("purchaseDate");
        const minDate = getMinDateFromApplication();

        if (minDate) {
          receiveDateInput.min = minDate;
          purchaseDateInput.min = minDate;

          if (receiveDateInput.value && receiveDateInput.value < minDate) {
            receiveDateInput.value = "";
          }
          if (purchaseDateInput.value && purchaseDateInput.value < minDate) {
            purchaseDateInput.value = "";
          }
        } else {
          receiveDateInput.min = "";
          purchaseDateInput.min = "";
        }

        if (receiveDateInput.value) {
          if (purchaseDateInput.value && purchaseDateInput.value < receiveDateInput.value) {
            purchaseDateInput.value = "";
          }
          if (!purchaseDateInput.min || purchaseDateInput.min < receiveDateInput.value) {
            purchaseDateInput.min = receiveDateInput.value;
          }
        }
      }

      function enforceReceiveDateMin() {
        const receiveDateInput = document.getElementById("receiveDate");
        const minDate = getMinDateFromApplication();

        if (!receiveDateInput.value || !minDate) return;

        if (receiveDateInput.value < minDate) {
          receiveDateInput.value = "";
          showMessage("受け取り希望日は申請日から10日後以降を選んでください。");
        }
      }

      function enforcePurchaseDateMin() {
        const purchaseDateInput = document.getElementById("purchaseDate");
        const receiveDateInput = document.getElementById("receiveDate");
        const minDate = getMinDateFromApplication();

        if (!purchaseDateInput.value) return;

        if (minDate && purchaseDateInput.value < minDate) {
          purchaseDateInput.value = "";
          showMessage("購入予定日は申請日から10日後以降を選んでください。");
          return;
        }

        if (receiveDateInput.value && purchaseDateInput.value < receiveDateInput.value) {
          purchaseDateInput.value = "";
          showMessage("購入予定日は受け取り希望日以降を選んでください。");
        }
      }

      function updatePurposeRestrictions() {
        const ticketType = getRadioValue("ticketType");
        const purposeCards = document.querySelectorAll("#purposeGroup .choice-card");
        const purposeRadios = document.querySelectorAll('input[name="purpose"]');

        if (ticketType === "回数券") {
          purposeRadios.forEach(radio => {
            const parent = radio.closest(".choice-card");
            const isCommuting = radio.value === "通学";

            if (isCommuting) {
              radio.disabled = false;
              parent.classList.remove("is-disabled");
            } else {
              radio.checked = false;
              radio.dataset.wasChecked = "false";
              radio.disabled = true;
              parent.classList.add("is-disabled");
            }
          });

          const commutingRadio = document.querySelector('input[name="purpose"][value="通学"]');
          if (commutingRadio && !commutingRadio.checked) {
            commutingRadio.checked = true;
            commutingRadio.dataset.wasChecked = "true";
          }

          document.getElementById("purposeOther").value = "";
          document.getElementById("purposeOtherSection").classList.add("hidden");
        } else {
          purposeRadios.forEach(radio => {
            const parent = radio.closest(".choice-card");
            radio.disabled = false;
            parent.classList.remove("is-disabled");
          });
        }
      }

      function updateTicketTypeFields() {
        const ticketType = getRadioValue("ticketType");
        const isLongDistance = ticketType === "遠距離乗車券";
        const isCoupon = ticketType === "回数券";

        document.getElementById("longDistanceSection1").classList.toggle("hidden", !isLongDistance);
        document.getElementById("longDistanceSection2").classList.toggle("hidden", !isLongDistance);
        document.getElementById("couponCountSection").classList.toggle("hidden", !isCoupon);

        if (!isLongDistance) {
          document.querySelectorAll('input[name="tripType1"]').forEach(el => {
            el.checked = false;
            el.dataset.wasChecked = "false";
          });
          document.querySelectorAll('input[name="tripType2"]').forEach(el => {
            el.checked = false;
            el.dataset.wasChecked = "false";
          });
          document.getElementById("noSamePurchase").checked = false;
        }

        if (!isCoupon) {
          document.getElementById("couponCount").value = "";
        }

        updatePurposeRestrictions();
        updateNoSamePurchaseField();
        updatePurposeOtherField();
      }

      function updateNoSamePurchaseField() {
        const ticketType = getRadioValue("ticketType");
        const tripType1 = getRadioValue("tripType1");
        const tripType2 = getRadioValue("tripType2");
        const section = document.getElementById("noSamePurchaseSection");

        const isLongDistance = ticketType === "遠距離乗車券";
        const hasRoundTrip = tripType1 === "往復" || tripType2 === "往復";

        if (isLongDistance && hasRoundTrip) {
          section.classList.remove("hidden");
          requestAnimationFrame(() => {
            section.classList.add("show");
          });
        } else {
          section.classList.remove("show");
          setTimeout(() => {
            if (!section.classList.contains("show")) {
              section.classList.add("hidden");
            }
          }, 250);
          document.getElementById("noSamePurchase").checked = false;
        }
      }

      function updateSatelliteOtherField() {
        const satelliteName = getRadioValue("satelliteName");
        const isOther = satelliteName === "その他";

        document.getElementById("satelliteNameOtherSection").classList.toggle("hidden", !isOther);

        if (!isOther) {
          document.getElementById("satelliteNameOther").value = "";
        }
      }

      function updatePurposeOtherField() {
        const purpose = getRadioValue("purpose");
        const ticketType = getRadioValue("ticketType");
        const isOther = purpose === "その他" && ticketType !== "回数券";

        document.getElementById("purposeOtherSection").classList.toggle("hidden", !isOther);

        if (!isOther) {
          document.getElementById("purposeOther").value = "";
        }
      }

      function updateShippingAddressField() {
        const receiveMethod = getRadioValue("receiveMethod");
        const isHomeDelivery = receiveMethod === "自宅(送料500円)";

        document.getElementById("shippingAddressSection").classList.toggle("hidden", !isHomeDelivery);

        if (!isHomeDelivery) {
          document.getElementById("shippingAddress").value = "";
        }
      }

      function enableRadioToggle() {
        const radios = document.querySelectorAll('input[type="radio"]');

        radios.forEach(radio => {
          radio.addEventListener("click", function (e) {
            if (this.disabled) return;

            const wasChecked = this.dataset.wasChecked === "true";
            const name = this.name;

            document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
              r.dataset.wasChecked = "false";
            });

            if (wasChecked) {
              this.checked = false;
              this.dataset.wasChecked = "false";
            } else {
              this.checked = true;
              this.dataset.wasChecked = "true";
            }

            updateTicketTypeFields();
            updateNoSamePurchaseField();
            updateSatelliteOtherField();
            updatePurposeOtherField();
            updateShippingAddressField();
          });
        });
      }

      function validateData(data) {
        if (!data.applicationDate) return "申請日を入力してください。";
        if (!data.name) return "氏名を入力してください。";
        if (!data.gender) return "男女を選択してください。";
        if (!data.satelliteName) return "サテライト教室名を選択してください。";
        if (data.satelliteName === "その他" && !data.satelliteNameOther) {
          return "サテライト教室名（その他）を入力してください。";
        }
        if (!data.age) return "年齢を入力してください。";
        if (!data.studentNo) return "学籍番号を入力してください。";
        if (!data.grade) return "学年を選択してください。";
        if (!data.applicantEmail) return "メールアドレスを入力してください。";
        if (!data.ticketType) return "種類を選択してください。";
        if (data.ticketType === "回数券" && !data.couponCount) {
          return "回数券の枚数を選択してください。";
        }
        if (!data.purpose) return "目的を選択してください。";
        if (data.purpose === "その他" && !data.purposeOther) {
          return "目的（その他）を入力してください。";
        }
        if (!data.companyName1) return "鉄道会社名1を選択してください。";
        if (!data.route1) return "乗車区間1を入力してください。";
        if (!data.receiveMethod) return "受け取り方法を選択してください。";
        if (data.receiveMethod === "自宅(送料500円)" && !data.shippingAddress) {
          return "発送先住所を入力してください。";
        }
        if (!data.receiveDate) return "受け取り希望日を入力してください。";
        if (!data.purchaseDate) return "購入予定日を入力してください。";

        const applicationDate = new Date(data.applicationDate);
        const receiveDate = new Date(data.receiveDate);
        const purchaseDate = new Date(data.purchaseDate);

        applicationDate.setHours(0, 0, 0, 0);
        receiveDate.setHours(0, 0, 0, 0);
        purchaseDate.setHours(0, 0, 0, 0);

        const minDate = new Date(applicationDate);
        minDate.setDate(minDate.getDate() + 10);

        if (receiveDate < minDate) {
          return "受け取り希望日は申請日から10日後以降を選んでください。";
        }

        if (purchaseDate < minDate) {
          return "購入予定日は申請日から10日後以降を選んでください。";
        }

        if (purchaseDate < receiveDate) {
          return "購入予定日は受け取り希望日以降を選んでください。";
        }

        return "";
      }

      async function submitForm() {
        const submitButton = document.getElementById("submitButton");

        const data = {
          applicationDate: document.getElementById("applicationDate").value,
          name: document.getElementById("name").value.trim(),
          gender: getRadioValue("gender"),
          satelliteName: getRadioValue("satelliteName"),
          satelliteNameOther: document.getElementById("satelliteNameOther").value.trim(),
          age: document.getElementById("age").value.trim(),
          studentNo: document.getElementById("studentNo").value.trim(),
          grade: getRadioValue("grade"),
          ticketType: getRadioValue("ticketType"),
          couponCount: document.getElementById("couponCount").value,
          purpose: getRadioValue("purpose"),
          purposeOther: document.getElementById("purposeOther").value.trim(),
          companyName1: getRadioValue("companyName1"),
          route1: document.getElementById("route1").value.trim(),
          tripType1: getRadioValue("tripType1"),
          companyName2: getRadioValue("companyName2"),
          route2: document.getElementById("route2").value.trim(),
          tripType2: getRadioValue("tripType2"),
          noSamePurchase: document.getElementById("noSamePurchase").checked,
          receiveMethod: getRadioValue("receiveMethod"),
          receiveDate: document.getElementById("receiveDate").value,
          purchaseDate: document.getElementById("purchaseDate").value,
          shippingAddress: document.getElementById("shippingAddress").value.trim(),
          applicantEmail: document.getElementById("applicantEmail").value.trim()
        };

        const validationError = validateData(data);
        if (validationError) {
          showMessage(validationError);
          return;
        }

        submitButton.disabled = true;
        showMessage("送信中...");

        try {
          const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
          });

          const result = await response.json();

          if (!result.success) {
            throw new Error(result.message || "送信に失敗しました");
          }

          showMessage(
            result.message +
              "<br><br>受付番号：<strong>" +
              result.receiptNo +
              "</strong><br>この番号を控えてください。" +
              "<br><br>申請内容の控えをメールでも送信しました。" +
              "<br>届かない場合は、迷惑メールフォルダもご確認ください。",
            true
          );

          lockFormAfterSuccess();
        } catch (error) {
          showMessage("エラー: " + error.message);
          submitButton.disabled = false;
        }
      }

      window.addEventListener("load", function () {
        setDefaultDates();
        enableRadioToggle();

        document.getElementById("applicationDate").addEventListener("change", function () {
          setDefaultDates();
          updateDateConstraints();
        });

        document.getElementById("receiveDate").addEventListener("change", function () {
          updateDateConstraints();
          enforceReceiveDateMin();
        });

        document.getElementById("purchaseDate").addEventListener("change", function () {
          updateDateConstraints();
          enforcePurchaseDateMin();
        });

        document.getElementById("submitButton").addEventListener("click", submitForm);

        updateTicketTypeFields();
        updateNoSamePurchaseField();
        updateSatelliteOtherField();
        updatePurposeOtherField();
        updateShippingAddressField();
        updateDateConstraints();
      });
    </script>
  </body>
</html>
