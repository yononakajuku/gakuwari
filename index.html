<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>学割証申請フォーム</title>
<style>
:root {
  --bg: #f4f5f7;
  --card: #ffffff;
  --text: #1f2937;
  --subtext: #6b7280;
  --border: #d1d5db;
  --accent: #111827;
  --danger: #b91c1c;
  --success: #166534;
  --marker: #374151; /* 少し濃い▫️ */
  --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* ===== 基本リセット ===== */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
    "Yu Gothic", "Meiryo", sans-serif;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  padding: 16px;
}

/* ===== レイアウト ===== */
.container {
  max-width: 860px;
  margin: 0 auto;
  min-width: 0;
}

.card {
  background: var(--card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px;
  overflow-x: hidden;
  min-width: 0;
}

h1 {
  margin: 0 0 8px 0;
  font-size: 28px;
}

.lead {
  margin-bottom: 20px;
  color: var(--subtext);
}

/* ===== セクション ===== */
.section {
  background: #fafafa;
  border: 1px solid #ececec;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  min-width: 0;
}

.section-title {
  margin-bottom: 12px;
  font-weight: bold;
}

/* ===== フィールド ===== */
.field {
  margin-bottom: 16px;
  min-width: 0;
}

label.main-label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

.marker {
  color: var(--marker);
  margin-right: 6px;
}

/* ===== 入力 ===== */
input,
select,
textarea {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
  background: #fff;
}

textarea {
  min-height: 100px;
}

/* ===== グリッド ===== */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.choice-grid {
  display: grid;
  gap: 10px;
  min-width: 0;
}

.choice-inline-2 {
  grid-template-columns: repeat(2, 1fr);
}

.choice-inline-3 {
  grid-template-columns: repeat(3, 1fr);
}

.choice-inline-4 {
  grid-template-columns: repeat(4, 1fr);
}

/* ===== ラジオカード ===== */
.choice-card {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 52px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #fff;
  cursor: pointer;
  width: 100%;
}

.choice-card input {
  width: 20px;
  height: 20px;
  margin: 0;
}

/* ===== テキスト ===== */
.note {
  font-size: 13px;
  color: var(--subtext);
  margin-top: 6px;
}

/* ===== 非表示 ===== */
.hidden {
  display: none;
}

/* ===== ボタン ===== */
button {
  width: 100%;
  min-height: 56px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: white;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
}

/* ===== メッセージ ===== */
#message {
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  display: none;
}

#message.show {
  display: block;
}

#message.success {
  background: #f0fdf4;
  color: var(--success);
}

#message.error {
  background: #fff5f5;
  color: var(--danger);
}

/* ===== タブレット ===== */
@media (max-width: 768px) {
  .row {
    grid-template-columns: 1fr;
  }
}

/* ===== スマホ完全最適化 ===== */
@media (max-width: 480px) {

  body {
    padding: 10px;
  }

  .container,
  .card {
    width: 100%;
    max-width: 100%;
  }

  .card {
    padding: 14px;
  }

  .section {
    padding: 14px;
  }

  h1 {
    font-size: 22px;
  }

  input,
  select,
  textarea {
    font-size: 16px;
  }

  /* 横並び → 縦 */
  .choice-inline-2,
  .choice-inline-3,
  .choice-inline-4 {
    grid-template-columns: 1fr !important;
  }

  .choice-card {
    width: 100%;
  }
}
</style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>学割証申請フォーム</h1>
        <p class="lead">
          必要事項を入力して送信してください。送信後、受付番号が表示され、入力したメールアドレス宛に受付完了メールが届きます。
        </p>

        <div class="section">
          <h2 class="section-title">基本情報</h2>

          <div class="field">
            <label class="main-label" for="applicationDate"
              ><span class="marker">▫️</span>申請日</label
            >
            <input id="applicationDate" type="date" />
          </div>

          <div class="field">
            <label class="main-label" for="name"
              ><span class="marker">▫️</span>氏名</label
            >
            <input id="name" type="text" />
          </div>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>男女</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input type="radio" name="gender" value="男" /> 男</label
              >
              <label class="choice-card"
                ><input type="radio" name="gender" value="女" /> 女</label
              >
            </div>
          </div>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>サテライト教室名</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input
                  type="radio"
                  name="satelliteName"
                  value="北京都"
                />
                北京都</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="satelliteName"
                  value="その他"
                />
                その他</label
              >
            </div>
          </div>

          <div id="satelliteNameOtherSection" class="hidden">
            <div class="field">
              <label class="main-label" for="satelliteNameOther"
                ><span class="marker">▫️</span>サテライト教室名（その他）</label
              >
              <input id="satelliteNameOther" type="text" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label class="main-label" for="age"
                ><span class="marker">▫️</span>年齢</label
              >
              <input id="age" type="number" inputmode="numeric" />
            </div>

            <div class="field">
              <label class="main-label" for="studentNo"
                ><span class="marker">▫️</span>学籍番号</label
              >
              <input id="studentNo" type="text" />
            </div>
          </div>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>学年</label
            >
            <div class="choice-grid choice-inline-3">
              <label class="choice-card"
                ><input type="radio" name="grade" value="1" /> 1</label
              >
              <label class="choice-card"
                ><input type="radio" name="grade" value="2" /> 2</label
              >
              <label class="choice-card"
                ><input type="radio" name="grade" value="3" /> 3</label
              >
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="applicantEmail"
              ><span class="marker">▫️</span>申請者メールアドレス</label
            >
            <input id="applicantEmail" type="email" />
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">申請内容</h2>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>種類</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input
                  type="radio"
                  name="ticketType"
                  value="回数券"
                />
                回数券</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="ticketType"
                  value="遠距離乗車券"
                />
                遠距離乗車券</label
              >
            </div>
          </div>

          <div id="couponCountSection" class="hidden">
            <div class="field">
              <label class="main-label" for="couponCount"
                ><span class="marker">▫️</span>回数券の枚数</label
              >
              <select id="couponCount">
                <option value="">選択してください</option>
                <option value="10枚">10枚</option>
                <option value="20枚">20枚</option>
                <option value="30枚">30枚</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>目的</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input type="radio" name="purpose" value="通学" /> 通学</label
              >
              <label class="choice-card"
                ><input type="radio" name="purpose" value="観光" /> 観光</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="purpose"
                  value="進路関係"
                />
                進路関係</label
              >
              <label class="choice-card"
                ><input type="radio" name="purpose" value="その他" /> その他</label
              >
            </div>
          </div>

          <div id="purposeOtherSection" class="hidden">
            <div class="field">
              <label class="main-label" for="purposeOther"
                ><span class="marker">▫️</span>目的（その他）</label
              >
              <input id="purposeOther" type="text" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">乗車情報</h2>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>鉄道会社名1</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input
                  type="radio"
                  name="companyName1"
                  value="JR"
                />
                JR</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="companyName1"
                  value="丹後鉄道"
                />
                丹後鉄道</label
              >
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="route1"
              ><span class="marker">▫️</span>乗車区間1</label
            >
            <input
              id="route1"
              type="text"
              placeholder="例: 西舞鶴〜東舞鶴のように記入してください"
            />
          </div>

          <div id="longDistanceSection1" class="hidden">
            <div class="field">
              <label class="main-label"
                ><span class="marker">▫️</span>往復 / 片道</label
              >
              <div class="choice-grid choice-inline-2">
                <label class="choice-card"
                  ><input
                    type="radio"
                    name="tripType1"
                    value="往復"
                  />
                  往復</label
                >
                <label class="choice-card"
                  ><input
                    type="radio"
                    name="tripType1"
                    value="片道"
                  />
                  片道</label
                >
              </div>
            </div>
          </div>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>鉄道会社名2</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input
                  type="radio"
                  name="companyName2"
                  value="JR"
                />
                JR</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="companyName2"
                  value="丹後鉄道"
                />
                丹後鉄道</label
              >
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="route2"
              ><span class="marker">▫️</span>乗車区間2</label
            >
            <input
              id="route2"
              type="text"
              placeholder="例: 西舞鶴〜東舞鶴のように記入してください"
            />
          </div>

          <div id="longDistanceSection2" class="hidden">
            <div class="field">
              <label class="main-label"
                ><span class="marker">▫️</span>往復 / 片道2</label
              >
              <div class="choice-grid choice-inline-2">
                <label class="choice-card"
                  ><input
                    type="radio"
                    name="tripType2"
                    value="往復"
                  />
                  往復</label
                >
                <label class="choice-card"
                  ><input
                    type="radio"
                    name="tripType2"
                    value="片道"
                  />
                  片道</label
                >
              </div>
            </div>
          </div>

          <div id="noSamePurchaseSection" class="hidden">
            <div class="field">
              <label class="choice-card">
                <input id="noSamePurchase" type="checkbox" />
                <span
                  ><span class="marker">▫️</span>同時購入しない</span
                >
              </label>
              <div class="note">
                ※ 往復分を希望するが、同時に購入しない場合（行き帰り別々に購入する場合）チェック（✓）してください。
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">受け取り情報</h2>

          <div class="field">
            <label class="main-label"
              ><span class="marker">▫️</span>受け取り方法</label
            >
            <div class="choice-grid choice-inline-2">
              <label class="choice-card"
                ><input
                  type="radio"
                  name="receiveMethod"
                  value="サテライト教室"
                />
                サテライト教室</label
              >
              <label class="choice-card"
                ><input
                  type="radio"
                  name="receiveMethod"
                  value="自宅(送料500円)"
                />
                自宅(送料500円)</label
              >
            </div>
          </div>

          <div id="shippingAddressSection" class="hidden">
            <div class="field">
              <label class="main-label" for="shippingAddress"
                ><span class="marker">▫️</span>発送先住所</label
              >
              <textarea id="shippingAddress"></textarea>
            </div>
          </div>

          <div class="field">
            <label class="main-label" for="receiveDate"
              ><span class="marker">▫️</span>受け取り希望日</label
            >
            <input id="receiveDate" type="date" />
            <div class="note">申請日から10日後以降を選んでください</div>
          </div>

          <div class="field">
            <label class="main-label" for="purchaseDate"
              ><span class="marker">▫️</span>購入予定日</label
            >
            <input id="purchaseDate" type="date" />
            <div class="note">購入予定日は受け取り希望日以降を選んでください</div>
          </div>
        </div>

        <div class="submit-wrap">
          <button id="submitButton" type="button">送信</button>
          <div id="message"></div>
        </div>
      </div>
    </div>

    <script>
      const WORKER_URL = "https://yononaka-gakuwari.tarohayata.workers.dev";

      function getRadioValue(name) {
        const checked = document.querySelector(`input[name="${name}"]:checked`);
        return checked ? checked.value : "";
      }

      function formatDateToInputValue(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function showMessage(text, isSuccess = false) {
        const message = document.getElementById("message");
        message.classList.add("show");
        if (isSuccess) {
          message.classList.add("success");
        } else {
          message.classList.remove("success");
        }
        message.innerHTML = text;
      }

      function setDefaultDates() {
        const today = new Date();
        const applicationDate = document.getElementById("applicationDate");

        if (!applicationDate.value) {
          applicationDate.value = formatDateToInputValue(today);
        }

        updateDateConstraints();
      }

      function updateDateConstraints() {
        const applicationDateValue = document.getElementById("applicationDate").value;
        const receiveDateInput = document.getElementById("receiveDate");
        const purchaseDateInput = document.getElementById("purchaseDate");

        if (applicationDateValue) {
          const applicationDate = new Date(applicationDateValue);
          applicationDate.setHours(0, 0, 0, 0);

          const minReceiveDate = new Date(applicationDate);
          minReceiveDate.setDate(minReceiveDate.getDate() + 10);

          receiveDateInput.min = formatDateToInputValue(minReceiveDate);

          if (receiveDateInput.value && receiveDateInput.value < receiveDateInput.min) {
            receiveDateInput.value = "";
          }
        } else {
          receiveDateInput.min = "";
          receiveDateInput.value = "";
        }

        if (receiveDateInput.value) {
          purchaseDateInput.min = receiveDateInput.value;
          if (purchaseDateInput.value && purchaseDateInput.value < purchaseDateInput.min) {
            purchaseDateInput.value = "";
          }
        } else {
          purchaseDateInput.min = "";
          if (purchaseDateInput.value) {
            purchaseDateInput.value = "";
          }
        }
      }

      function updateTicketTypeFields() {
        const ticketType = getRadioValue("ticketType");
        const isLongDistance = ticketType === "遠距離乗車券";
        const isCoupon = ticketType === "回数券";

        document.getElementById("longDistanceSection1").classList.toggle("hidden", !isLongDistance);
        document.getElementById("longDistanceSection2").classList.toggle("hidden", !isLongDistance);
        document.getElementById("couponCountSection").classList.toggle("hidden", !isCoupon);

        if (!isLongDistance) {
          document.querySelectorAll('input[name="tripType1"]').forEach(el => el.checked = false);
          document.querySelectorAll('input[name="tripType2"]').forEach(el => el.checked = false);
          document.getElementById("noSamePurchase").checked = false;
        }

        if (!isCoupon) {
          document.getElementById("couponCount").value = "";
        }

        updateNoSamePurchaseField();
      }

      function updateNoSamePurchaseField() {
        const ticketType = getRadioValue("ticketType");
        const tripType1 = getRadioValue("tripType1");
        const tripType2 = getRadioValue("tripType2");

        const isLongDistance = ticketType === "遠距離乗車券";
        const hasRoundTrip = tripType1 === "往復" || tripType2 === "往復";
        const shouldShow = isLongDistance && hasRoundTrip;

        document.getElementById("noSamePurchaseSection").classList.toggle("hidden", !shouldShow);

        if (!shouldShow) {
          document.getElementById("noSamePurchase").checked = false;
        }
      }

      function updateSatelliteOtherField() {
        const satelliteName = getRadioValue("satelliteName");
        const isOther = satelliteName === "その他";

        document.getElementById("satelliteNameOtherSection").classList.toggle("hidden", !isOther);

        if (!isOther) {
          document.getElementById("satelliteNameOther").value = "";
        }
      }

      function updatePurposeOtherField() {
        const purpose = getRadioValue("purpose");
        const isOther = purpose === "その他";

        document.getElementById("purposeOtherSection").classList.toggle("hidden", !isOther);

        if (!isOther) {
          document.getElementById("purposeOther").value = "";
        }
      }

      function updateShippingAddressField() {
        const receiveMethod = getRadioValue("receiveMethod");
        const isHomeDelivery = receiveMethod === "自宅(送料500円)";

        document.getElementById("shippingAddressSection").classList.toggle("hidden", !isHomeDelivery);

        if (!isHomeDelivery) {
          document.getElementById("shippingAddress").value = "";
        }
      }

      function validateData(data) {
        if (!data.applicationDate) return "申請日を入力してください。";
        if (!data.name) return "氏名を入力してください。";
        if (!data.gender) return "男女を選択してください。";
        if (!data.satelliteName) return "サテライト教室名を選択してください。";
        if (data.satelliteName === "その他" && !data.satelliteNameOther) {
          return "サテライト教室名（その他）を入力してください。";
        }
        if (!data.age) return "年齢を入力してください。";
        if (!data.studentNo) return "学籍番号を入力してください。";
        if (!data.grade) return "学年を選択してください。";
        if (!data.applicantEmail) return "申請者メールアドレスを入力してください。";
        if (!data.ticketType) return "種類を選択してください。";
        if (data.ticketType === "回数券" && !data.couponCount) {
          return "回数券の枚数を選択してください。";
        }
        if (!data.purpose) return "目的を選択してください。";
        if (data.purpose === "その他" && !data.purposeOther) {
          return "目的（その他）を入力してください。";
        }
        if (!data.companyName1) return "鉄道会社名1を選択してください。";
        if (!data.route1) return "乗車区間1を入力してください。";
        if (!data.receiveMethod) return "受け取り方法を選択してください。";
        if (data.receiveMethod === "自宅(送料500円)" && !data.shippingAddress) {
          return "発送先住所を入力してください。";
        }
        if (!data.receiveDate) return "受け取り希望日を入力してください。";
        if (!data.purchaseDate) return "購入予定日を入力してください。";

        const applicationDate = new Date(data.applicationDate);
        const receiveDate = new Date(data.receiveDate);
        const purchaseDate = new Date(data.purchaseDate);

        applicationDate.setHours(0, 0, 0, 0);
        receiveDate.setHours(0, 0, 0, 0);
        purchaseDate.setHours(0, 0, 0, 0);

        const minReceiveDate = new Date(applicationDate);
        minReceiveDate.setDate(minReceiveDate.getDate() + 10);

        if (receiveDate < minReceiveDate) {
          return "受け取り希望日は申請日から10日後以降を選んでください。";
        }

        if (purchaseDate < receiveDate) {
          return "購入予定日は受け取り希望日以降を選んでください。";
        }

        return "";
      }

      async function submitForm() {
        const submitButton = document.getElementById("submitButton");

        const data = {
          applicationDate: document.getElementById("applicationDate").value,
          name: document.getElementById("name").value.trim(),
          gender: getRadioValue("gender"),
          satelliteName: getRadioValue("satelliteName"),
          satelliteNameOther: document.getElementById("satelliteNameOther").value.trim(),
          age: document.getElementById("age").value.trim(),
          studentNo: document.getElementById("studentNo").value.trim(),
          grade: getRadioValue("grade"),
          ticketType: getRadioValue("ticketType"),
          couponCount: document.getElementById("couponCount").value,
          purpose: getRadioValue("purpose"),
          purposeOther: document.getElementById("purposeOther").value.trim(),
          companyName1: getRadioValue("companyName1"),
          route1: document.getElementById("route1").value.trim(),
          tripType1: getRadioValue("tripType1"),
          companyName2: getRadioValue("companyName2"),
          route2: document.getElementById("route2").value.trim(),
          tripType2: getRadioValue("tripType2"),
          noSamePurchase: document.getElementById("noSamePurchase").checked,
          receiveMethod: getRadioValue("receiveMethod"),
          receiveDate: document.getElementById("receiveDate").value,
          purchaseDate: document.getElementById("purchaseDate").value,
          shippingAddress: document.getElementById("shippingAddress").value.trim(),
          applicantEmail: document.getElementById("applicantEmail").value.trim()
        };

        const validationError = validateData(data);
        if (validationError) {
          showMessage(validationError);
          return;
        }

        submitButton.disabled = true;
        showMessage("送信中...");

        try {
          const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
          });

          const result = await response.json();

          if (!result.success) {
            throw new Error(result.message || "送信に失敗しました");
          }

          showMessage(
            result.message +
              "<br><br>受付番号：<strong>" +
              result.receiptNo +
              "</strong><br>この番号を控えてください。",
            true
          );

          document.querySelector(".card").scrollIntoView({ behavior: "smooth" });
        } catch (error) {
          showMessage("エラー: " + error.message);
        } finally {
          submitButton.disabled = false;
        }
      }

      window.addEventListener("load", function () {
        setDefaultDates();

        document.getElementById("applicationDate").addEventListener("change", updateDateConstraints);
        document.getElementById("receiveDate").addEventListener("change", updateDateConstraints);

        document.querySelectorAll('input[name="ticketType"]').forEach(function (el) {
          el.addEventListener("change", updateTicketTypeFields);
        });

        document.querySelectorAll('input[name="tripType1"]').forEach(function (el) {
          el.addEventListener("change", updateNoSamePurchaseField);
        });

        document.querySelectorAll('input[name="tripType2"]').forEach(function (el) {
          el.addEventListener("change", updateNoSamePurchaseField);
        });

        document.querySelectorAll('input[name="satelliteName"]').forEach(function (el) {
          el.addEventListener("change", updateSatelliteOtherField);
        });

        document.querySelectorAll('input[name="purpose"]').forEach(function (el) {
          el.addEventListener("change", updatePurposeOtherField);
        });

        document.querySelectorAll('input[name="receiveMethod"]').forEach(function (el) {
          el.addEventListener("change", updateShippingAddressField);
        });

        document.getElementById("submitButton").addEventListener("click", submitForm);

        updateTicketTypeFields();
        updateNoSamePurchaseField();
        updateSatelliteOtherField();
        updatePurposeOtherField();
        updateShippingAddressField();
        updateDateConstraints();
      });
    </script>
  </body>
</html>
